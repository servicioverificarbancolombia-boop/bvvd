	<!-- Script para ajustar el tama&ntilde;o y ubicaci&oacute;n en la pantalla del iframe -->
	<script>
		//<![CDATA[
		jQuery(document).ready(function(){
			inicializarValores();
		});
		var valorActualTop, valorActualLeft, divPopup, iframePopup, btnHelp, buttonHeight, buttonWidth, valorHeightPantalla, valorWidthPantalla, viviComponent;
		var openChat = false;
		
		function inicializarValores() {
			// Obtener elementos del popup
			divPopup = window.parent.document.getElementById("bg-modal");
			iframePopup = window.parent.document.getElementById("iframe-modal");
			btnHelp = document.getElementById("popupChat:idBtnHelp");
			viviComponent = document.getElementById("chat-widget");
			dashboardform = window.parent.document.getElementById("dashboardform");
			buttonHeight = btnHelp != null ? (btnHelp.clientHeight != null ? btnHelp.clientHeight : 10) : 10;
			buttonWidth = btnHelp != null ? (btnHelp.clientWidth != null ? btnHelp.clientWidth : 30) : 30;
				
			// Valores para tamaños de pantalla
			valorHeightPantalla = window.parent.innerHeight;
			valorWidthPantalla = window.parent.innerWidth;
			
			validacionTipoPantalla();
			// Ajustar iframe al tamaño del botón
			divPopup.style.width = (buttonWidth + 5) + "px";
			divPopup.style.height = (buttonHeight + 5) + "px";
			
			iframePopup.style.width = (buttonWidth + 5) + "px";
			iframePopup.style.height = (buttonHeight + 5) + "px";
			
			// Ubicar iframe en la pantalla con top y left
			divPopup.style.top = (valorHeightPantalla - buttonHeight - 50) + "px";
			divPopup.style.left = (valorWidthPantalla - buttonWidth - 40) + "px";
			
			// Quitar background por defecto del popup
			divPopup.style.background = 'none';
		}
		

		
		function cambiarIframeCompleto() {
			var btnTop = divPopup.style.top;
			var btnLeft = divPopup.style.left;
			
			// Cambiar iframe al tamaño de la pantalla en el navegador
			divPopup.style.width = valorWidthPantalla + "px";
			divPopup.style.height = valorHeightPantalla + "px";
			
			iframePopup.style.width = valorWidthPantalla + "px";
			iframePopup.style.height = valorHeightPantalla + "px";
			
			divPopup.style.top = 0 + "px";
			divPopup.style.left = 0 + "px";
			
			// Cambiar top y left del botón por los valores del div que contiene el iframe
			btnHelp.style.top = btnTop;
			btnHelp.style.left = btnLeft;
		}
		
		function cambiarIframeParcial() {
			// Ajustar iframe al tamaño del botón
			divPopup.style.width = (buttonWidth + 5) + "px";
			divPopup.style.height = (buttonHeight + 5) + "px";
			
			iframePopup.style.width = (buttonWidth + 5) + "px";
			iframePopup.style.height = (buttonHeight + 5) + "px";
			
			// Si el botón no tiene top ni left tomar los valores guardados en las variables
			if (!(btnHelp.style.top != '0px' || btnHelp.style.left != '0px')) { 
				btnHelp.style.top = valorActualTop;
				btnHelp.style.left = valorActualLeft;
				
				divPopup.style.minWidth = 0;
				divPopup.style.minHeight = 0;
				
				iframePopup.style.minWidth = 0;
				iframePopup.style.minHeight = 0;
			}
			
			// Darle al div los valores de top y left del botón
			divPopup.style.top = btnHelp.style.top;
			divPopup.style.left = btnHelp.style.left;
			
			// Quitarle el top y left al botón
			btnHelp.style.top = 0 + "px";
			btnHelp.style.left = 0 + "px";
			
			$(btnHelp).removeClass('btnHelp-position')
		}
		
		function cambiarIframeChat() {
			// Agregar un valor a las variables para ubicar el botón en pantalla
			valorActualTop = divPopup.style.top;
			valorActualLeft = divPopup.style.left;
			
			validacionTipoPantalla();
			
			let valorHeight = 690;
			let valorWidth = 420;
			
			while ((valorHeight + 50) > valorHeightPantalla){
				valorHeight = valorHeight - 100;	
			}
			
			// Valores mínimos para el chat de vivi
			divPopup.style.minWidth = valorWidth + "px";
			divPopup.style.minHeight = valorHeight + "px";
			
			iframePopup.style.minWidth = valorWidth + "px";
			iframePopup.style.minHeight = valorHeight + "px";
			
			// Top y left para el div
			divPopup.style.left = (valorWidthPantalla - valorWidth - 40) + "px";
			divPopup.style.top = (valorHeightPantalla - valorHeight - 50) + "px";
		}
		
		
		function validacionTipoPantalla() {
			// Validación para posición de botón web y móvil
			if (window.parent.innerHeight > dashboardform.clientHeight) {
				valorHeightPantalla = dashboardform.clientHeight;
				valorWidthPantalla = dashboardform.clientWidth;
			}
		}
		
		//]]>
	</script>
	<script>
		// Abrir chat cuando se da clic en el botón
		function toggleMessenger() {
			let timeout="3,2"
			let channel="WEB - Zona Privada"
  			cambiarIframeChat();
   			ocultBtn();
	   		showChatWidget(timeout, channel);									
   			cambiarIframeCompleto();
   			openChat = true;
		};
		
		// Cierra el chat de vivi y renderiza nuevamente el boton en la zona de inicializacion.
		function closeChatVivi(){
			viviComponent.style.display = 'none';
			viewBtn();
			const newLeftBtn = divPopup.offsetLeft+divPopup.clientWidth-btnHelp.clientWidth;
			const newTopBtn = divPopup.offsetTop+divPopup.clientHeight-btnHelp.clientHeight;
			divPopup.style.minWidth = ""
			divPopup.style.minHeight = ""
			iframePopup.style.minWidth = ""
			iframePopup.style.minHeight = ""
			divPopup.style.width = (btnHelp.clientWidth + 5) + "px";
			divPopup.style.height = (btnHelp.clientHeight + 5) + "px";
			divPopup.style.left = newLeftBtn + "px";
			divPopup.style.top = newTopBtn + "px";
			openChat = false;
			
		}
	</script>

	<!-- Script bot&oacute;n chat draggable -->
	<script>
		//<![CDATA[
		jQuery(document).ready(function(){
			drag();
		});
		function drag() {
			var btnHelp = document.getElementById("popupChat:idBtnHelp");
			btnHelp.style.top = 0 + "px";
			btnHelp.style.left = 0 + "px";
    		dragElement(btnHelp);
		}

		function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
              cambiarIframeCompleto();
              e = e || window.event;
              e.preventDefault();
              // get the mouse cursor position at startup:
              //pos3 = e.clientX;
              //pos4 = e.clientY;
              pos3 = divPopup.style.left;
              pos4 = divPopup.style.top;
              document.onmouseup = closeDragElement;
              // call a function whenever the cursor moves:
              document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
              e = e || window.event;
              e.preventDefault();
              // calculate the new cursor position:
              pos1 = pos3 - e.clientX;
              pos2 = pos4 - e.clientY;
              pos3 = e.clientX;
              pos4 = e.clientY;
              // set the element's new position:
              // button position within the window
              // axe y
			  var buttonHeight = elmnt.clientHeight;
              
              if ((elmnt.offsetTop - pos2 + buttonHeight) > window.innerHeight) {
            	  elmnt.style.top = window.innerHeight - buttonHeight + "px";
              } else {
            	  if (-(elmnt.offsetTop - pos2) > 0) {
            		  elmnt.style.top = 0 + "px";
            	  } else {
                	  elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; 
            	  }
              }

              // axe x
			  var buttonWidth = elmnt.clientWidth;
              if ((elmnt.offsetLeft - pos1 + buttonWidth) > window.innerWidth) {
            	  elmnt.style.left = window.innerWigth - buttonWidth + "px";
              } else {
            	  if (-(elmnt.offsetLeft - pos1) > 0) {
            		  elmnt.style.left = 0 + "px";
            	  } else {
                      elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            	  }
              }
              // Remove styles
           	  $(elmnt).removeClass('btnHelp-position')
            }
  			
            function closeDragElement() {
                // stop moving when mouse button is released
                document.onmouseup = null;
                document.onmousemove = null;
                
                cambiarIframeParcial();
              }
  		}
		//]]>
	</script>           			

	<!-- Script para identificar click o drag del bot&oacute;n chat -->
	<script>
		//<![CDATA[
		jQuery(document).ready(function(){
			events();
		});
		function events() {
		    let dragElement = false;
		    document.addEventListener('mousedown', () => dragElement = false);
		    document.addEventListener('mousemove', () => dragElement = true);
		  	// Drag o click?
		    document.addEventListener('mouseup', () => dragElement ? '' : (loaderBtn(),!openChat && toggleMessenger(), window.parent.gtmEvent('Botón necesita ayuda','Click necesita ayuda','Zona Privada - Boton flotante necesita ayuda')));
		}
		//]]>
	</script>
